<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CartridgeOS — tsz native rendering in browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
  h1 { font-size: 16px; color: #58a6ff; }
  .subtitle { font-size: 11px; color: #8b949e; }
  #screen { width: 800px; height: 600px; background: #000; border: 1px solid #30363d; border-radius: 4px; overflow: hidden; }
  #log { font-size: 12px; white-space: pre-wrap; color: #8b949e; line-height: 1.6; max-width: 800px; width: 100%; max-height: 200px; overflow-y: auto; }
  .pass { color: #3fb950; } .fail { color: #f85149; } .accent { color: #58a6ff; } .kernel { color: #d2a8ff; }
  #terminal { width: 800px; height: 120px; background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; font-family: monospace; font-size: 12px; padding: 8px; overflow-y: auto; white-space: pre-wrap; }
  #cmd { width: 800px; background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; font-family: monospace; font-size: 13px; padding: 8px; outline: none; }
  #cmd:focus { border-color: #58a6ff; }
  .status { display: flex; gap: 16px; font-size: 11px; width: 800px; }
  .status span { padding: 2px 8px; border-radius: 3px; }
  .status .on { background: #238636; color: #fff; }
  .status .off { background: #30363d; color: #8b949e; }
  .status .boot { background: #9e6a03; color: #fff; }
</style>
</head>
<body>
<h1>CartridgeOS</h1>
<div class="subtitle">tsz native rendering — real Linux + virtio-gpu via v86</div>

<div class="status">
  <span id="s-tsz" class="off">tsz</span>
  <span id="s-gpu" class="off">virtio-gpu</span>
  <span id="s-linux" class="off">Linux</span>
</div>

<!-- v86 renders VGA/virtio-gpu output into this container -->
<div id="screen"></div>

<div id="terminal"></div>
<input id="cmd" type="text" placeholder="Type a command... (runs in real Linux kernel)" autocomplete="off">

<div id="log"></div>

<script src="v86/libv86.js"></script>
<script>
const logEl = document.getElementById('log');
const termEl = document.getElementById('terminal');
const cmdEl = document.getElementById('cmd');

function log(msg, cls) {
  const span = document.createElement('span');
  span.textContent = msg + '\n';
  if (cls) span.className = cls;
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}
function termWrite(msg, cls) {
  const span = document.createElement('span');
  span.textContent = msg;
  if (cls) span.className = cls;
  termEl.appendChild(span);
  termEl.scrollTop = termEl.scrollHeight;
}
function setStatus(id, state) {
  document.getElementById(id).className = state;
}

// ══════════════════════════════════════════════════════════════════════
// v86 Linux emulator — tsz renders natively via virtio-gpu
// The VGA framebuffer IS the tsz output. No WASM rendering layer.
// ══════════════════════════════════════════════════════════════════════

let emulator = null;
let linuxReady = false;
let serialBuffer = '';

async function boot() {
  log('Booting CartridgeOS via v86...', 'kernel');
  setStatus('s-linux', 'boot');

  emulator = new V86({
    wasm_path: 'v86/v86.wasm',
    bios: { url: 'v86/seabios.bin' },
    vga_bios: { url: 'v86/vgabios.bin' },
    bzimage: { url: 'vmlinuz' },
    initrd: { url: 'initrd.cpio.gz' },
    cmdline: 'rdinit=/init console=ttyS0 loglevel=3',
    memory_size: 512 * 1024 * 1024,
    vga_memory_size: 16 * 1024 * 1024,
    screen_container: document.getElementById('screen'),
    autostart: true,
  });

  emulator.add_listener('emulator-ready', () => {
    log('v86 emulator ready', 'pass');
  });

  emulator.add_listener('emulator-started', () => {
    log('v86 emulator started — booting kernel...', 'accent');
  });

  // Capture serial output (Linux console output via ttyS0)
  let serialBytes = 0;
  emulator.add_listener('serial0-output-byte', function(byte) {
    serialBytes++;
    const char = String.fromCharCode(byte);
    serialBuffer += char;
    if (char === '\n') {
      const line = serialBuffer.trimEnd()
        .replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '')
        .replace(/\x1b\[[\?]?[0-9;]*[a-zA-Z]/g, '');
      serialBuffer = '';
      if (line.length > 0 && line.trim().length > 0) {
        termWrite(line + '\n', 'kernel');

        // Detect boot milestones
        if (line.includes('DRM:') && line.includes('card0')) {
          setStatus('s-gpu', 'on');
          log('virtio-gpu initialized', 'pass');
        }
        if (line.includes('Launching tsz')) {
          setStatus('s-tsz', 'boot');
          log('tsz app launching...', 'accent');
        }
        if (line.includes('tsz app exited') || line.includes('dropping to shell')) {
          if (!linuxReady) {
            linuxReady = true;
            setStatus('s-linux', 'on');
            log('Linux kernel booted', 'pass');
          }
        }
        if (line.includes('CartridgeOS v0.3')) {
          setStatus('s-linux', 'on');
          linuxReady = true;
        }
      }
    }
  });

  // Debug: check progress after timeout
  setTimeout(() => {
    log('serial bytes received: ' + serialBytes, serialBytes > 0 ? 'pass' : 'fail');
    if (serialBytes === 0) {
      log('No serial output — kernel may need more time or is incompatible', 'fail');
    }
  }, 15000);
}

// Send command to Linux via serial
function linuxExec(cmd) {
  if (!emulator || !linuxReady) {
    termWrite('(kernel not ready)\n', 'fail');
    return;
  }
  emulator.serial0_send(cmd + '\n');
}

cmdEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const cmd = cmdEl.value.trim();
    if (cmd) {
      termWrite('$ ' + cmd + '\n');
      linuxExec(cmd);
      cmdEl.value = '';
    }
  }
});

boot();
</script>
</body>
</html>
