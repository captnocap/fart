<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Data Explorer — Variations</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="explorer/explorer.css" />
<style>
  /* Make the canvas bg consistent with cockpit */
  body { background: var(--bg); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="explorer/sample-data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="explorer/v1-tree.jsx"></script>
<script type="text/babel" src="explorer/v2-table.jsx"></script>
<script type="text/babel" src="explorer/v3-spatial.jsx"></script>
<script type="text/babel" src="explorer/v4-graph.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, DexTree, DexTable, DexSpatial, DexGraph } = window;
  const D = window.SAMPLE_DATA;

  function Caption({ hd, children }) {
    return (
      <div className="dex-caption">
        <div className="hd">{hd}</div>
        <div>{children}</div>
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas
        title="COMPACT DATA EXPLORER"
        subtitle="Four approaches · all editable · all searchable · all shaped by the cockpit vocabulary"
      >
        <DCSection id="formal" title="FORMAL — the familiar patterns, sharpened">
          <DCArtboard id="v1-tree" label="V1 · TREE ROWS — nested JSON / AST / config" width={560} height={520}>
            <DexTree data={D.run_config} title="run_config" id="A.1" />
          </DCArtboard>

          <DCArtboard id="v1-tree-md" label="V1b · TREE — markdown AST (same component)" width={440} height={520}>
            <DexTree data={D.md_ast} title="md_ast" id="A.1b" />
          </DCArtboard>

          <DCArtboard id="v2-table" label="V2 · TABLE — SQLite tables, editable cells" width={720} height={520}>
            <DexTable db={D.db} id="A.2" title="sweatshop.db" />
          </DCArtboard>
        </DCSection>

        <DCSection id="weird" title="WEIRD — novel metaphors for feel + direct manipulation">
          <DCArtboard id="v3-spatial" label="V3 · SHAPE — radial spatial map, scrub leaves in place" width={720} height={560}>
            <DexSpatial data={D.run_config} title="run_config" id="A.3" />
          </DCArtboard>

          <DCArtboard id="v4-graph" label="V4 · GRAPH — Obsidian-style + similarity heatmap" width={820} height={560}>
            <DexGraph graph={D.graph} id="A.4" title="run_7f3a embeddings" />
          </DCArtboard>
        </DCSection>

        <DCSection id="tile-scale" title="COMPACT — tile-sized, fits the cockpit grid">
          <DCArtboard id="tile-tree" label="TREE @ tile scale" width={340} height={240}>
            <DexTree data={D.run_config.supervisor} title="supervisor" id="T.1" />
          </DCArtboard>

          <DCArtboard id="tile-table" label="TABLE @ tile scale" width={360} height={240}>
            <DexTable db={{ tables: { events: D.db.tables.events } }} id="T.2" title="events" />
          </DCArtboard>

          <DCArtboard id="tile-spatial" label="SHAPE @ tile scale" width={360} height={240}>
            <DexSpatial data={D.run_config.flags} title="flags" id="T.3" />
          </DCArtboard>

          <DCArtboard id="tile-graph" label="GRAPH @ tile scale" width={420} height={240}>
            <DexGraph graph={D.graph} id="T.4" title="embeds" />
          </DCArtboard>
        </DCSection>

        <DCSection id="notes" title="NOTES">
          <DCArtboard id="n1" label="read" width={520} height={260}>
            <div style={{ padding: 18, background: "var(--bg-1)", height: "100%", boxSizing: "border-box", border: "1px solid var(--rule)" }}>
              <Caption hd="SHARED VOCABULARY">
                <div><span className="hl">Header strip</span> — id code, view label, mode tabs, count hint.</div>
                <div><span className="hl">Search bar</span> — "/" hotkey, filters keys and values; matches highlight amber.</div>
                <div><span className="hl">Footer</span> — live breadcrumb of selection; edit counter glows when dirty.</div>
                <div style={{ marginTop: 8 }}><span className="hl">Colors</span> — <span style={{ color: "var(--ok)" }}>str</span> · <span style={{ color: "var(--blue)" }}>num</span> · <span style={{ color: "var(--lilac)" }}>bool</span> · <span style={{ color: "var(--ink-dimmer)", fontStyle: "italic" }}>null</span> · <span style={{ color: "var(--accent)" }}>edited</span></div>
              </Caption>
            </div>
          </DCArtboard>

          <DCArtboard id="n2" label="editing" width={520} height={260}>
            <div style={{ padding: 18, background: "var(--bg-1)", height: "100%", boxSizing: "border-box", border: "1px solid var(--rule)" }}>
              <Caption hd="EDIT IN PLACE — LIKE DEVTOOLS, BUT REAL">
                <div><span className="hl">Tree</span> — click any scalar to edit; booleans get a TRUE/FALSE toggle.</div>
                <div><span className="hl">Table</span> — click any cell; numbers align right with a faint bar showing position in the column's range.</div>
                <div><span className="hl">Shape</span> — click a leaf node; a scrubber pops up — drag range for numbers, flip for booleans.</div>
                <div><span className="hl">Graph</span> — hover an edge, drag the slider to retune similarity weights live.</div>
                <div style={{ marginTop: 8, color: "var(--accent)" }}>All edits track in the header (REVERT N) and glow in the footer.</div>
              </Caption>
            </div>
          </DCArtboard>

          <DCArtboard id="n3" label="what's next" width={520} height={260}>
            <div style={{ padding: 18, background: "var(--bg-1)", height: "100%", boxSizing: "border-box", border: "1px solid var(--rule)" }}>
              <Caption hd="OPEN QUESTIONS">
                <div>— Which variation do you want to take further?</div>
                <div>— Merge into one component with view-switcher, or keep as distinct tools?</div>
                <div>— Should edits commit to a live backend, or stage as a patch/diff panel?</div>
                <div>— Add: diff view between two JSON objects, history scrubber, query DSL bar?</div>
                <div>— Graph: want real cosine sim from embeddings, or stay visual-only?</div>
              </Caption>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
