<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Frank Worker — sweatshop translation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="styles2.css" />
<link rel="stylesheet" href="worker/frank.css" />
<style>body { background: var(--bg); }</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="worker/frank.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, FrankWorker } = window;
  const { FrankCardV1, FrankCardV2, FrankComposerV3 } = FrankWorker;

  function Note({ hd, children }) {
    return (
      <div style={{
        padding: 16, height: "100%", boxSizing: "border-box",
        background: "var(--bg-1)", border: "1px solid var(--rule)",
        display: "flex", flexDirection: "column", gap: 8,
        fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--ink-dim)"
      }}>
        <div style={{
          fontSize: 9, letterSpacing: "0.18em",
          color: "var(--accent)", fontWeight: 600,
          borderBottom: "1px solid var(--rule)", paddingBottom: 6
        }}>{hd}</div>
        <div style={{ lineHeight: 1.6 }}>{children}</div>
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas
        title="FRANK WORKER · SWEATSHOP TRANSLATION"
        subtitle="Your pasted design remapped into the warm paper-black ATC system · three takes"
      >
        <DCSection id="context" title="CONTEXT — the translation map">
          <DCArtboard id="map" label="what changed · visual vocabulary" width={520} height={380}>
            <Note hd="TRANSLATION MAP">
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <div>
                  <div style={{ color: "var(--ink-dimmer)", fontSize: 8, letterSpacing: "0.15em", marginBottom: 4 }}>FROM · YOUR PASTE</div>
                  <div>slate <span style={{color:"#1a1b26"}}>■</span> #1a1b26</div>
                  <div>orange-500</div>
                  <div>rose / fuchsia / amber</div>
                  <div>rounded-lg, shadow-xl</div>
                  <div>lucide icons</div>
                  <div>mixed sans/mono</div>
                </div>
                <div>
                  <div style={{ color: "var(--ink-dimmer)", fontSize: 8, letterSpacing: "0.15em", marginBottom: 4 }}>TO · SWEATSHOP</div>
                  <div>paper-black <span style={{color:"var(--bg-1)"}}>■</span> --bg-1</div>
                  <div>--accent #d26a2a</div>
                  <div>--flag / --warn / --lilac / --ok</div>
                  <div>hairline rules + corner marks</div>
                  <div>glyph chars · · ∿ △ ◇ ◆ ◎</div>
                  <div>JetBrains Mono first</div>
                </div>
              </div>
              <div style={{ marginTop: 8, color: "var(--ink)" }}>
                <span style={{ color: "var(--accent)" }}>→</span> Gutters stay, but recolored with our <span className="hl" style={{color:"var(--accent)"}}>tc-*</span> source palette (sys/ctx/usr/ast/tool/atch/wnd/pin).<br />
                <span style={{ color: "var(--accent)" }}>→</span> The "pathology tag" popover moves from fuchsia to <span style={{color:"var(--lilac)"}}>--lilac</span> — already our pathology/classifier color in the board tile.<br />
                <span style={{ color: "var(--accent)" }}>→</span> Card chrome = <span style={{color:"var(--accent)"}}>--rule-bright</span> with corner marks, the cockpit's house frame.
              </div>
            </Note>
          </DCArtboard>

          <DCArtboard id="palette" label="palette · in context" width={380} height={380}>
            <Note hd="PALETTE ROLES">
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {[
                  ["--accent", "#d26a2a", "frame · active body · focused"],
                  ["--flag",   "#e14a2a", "counterfeiter · kill · cliff"],
                  ["--warn",   "#d6a54a", "stuck · pane-6 · thinking"],
                  ["--ok",     "#6aa390", "quest · verification · pass"],
                  ["--lilac",  "#8a7fd4", "tag pathology · rationalize"],
                  ["--blue",   "#5a8bd6", "you · river · file-slot"],
                ].map(([k, v, use]) => (
                  <div key={k} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ width: 18, height: 18, background: v, border: "1px solid var(--rule)", flexShrink: 0 }} />
                    <span style={{ color: "var(--ink)", width: 72 }}>{k}</span>
                    <span style={{ color: "var(--ink-dimmer)", fontSize: 9 }}>{v}</span>
                    <span style={{ color: "var(--ink-dim)", fontSize: 10, marginLeft: "auto" }}>{use}</span>
                  </div>
                ))}
              </div>
            </Note>
          </DCArtboard>
        </DCSection>

        <DCSection id="v1" title="V1 — FAITHFUL · same card, our vocabulary">
          <DCArtboard id="frank-v1" label="frank card · gutters + tabs + quest" width={720} height={760}>
            <div style={{ padding: 18, background: "var(--bg)", minHeight: "100%", boxSizing: "border-box" }}>
              <FrankCardV1 />
            </div>
          </DCArtboard>

          <DCArtboard id="frank-v1-notes" label="what carried over" width={360} height={760}>
            <Note hd="FAITHFUL TAKE — NOTES">
              <div><span className="hl" style={{color:"var(--accent)"}}>Kept:</span> gutters, three-tabs, avatar-with-thermometer, trust badge, Pane-6 special, context cliff bar, stuck timer, sentiment 5-button, turns & cost footer, grocery-store-pen quest, verification code.</div>
              <div style={{ marginTop: 8 }}><span className="hl" style={{color:"var(--accent)"}}>Swapped:</span>
                <ul style={{ margin: "4px 0 0 14px", padding: 0 }}>
                  <li>lucide → glyph chars (◆ ◇ ∿ △ ◉ ■)</li>
                  <li>tailwind slate → bg-1 / bg-2 / rule-bright</li>
                  <li>fuchsia popover → lilac (our pathology color)</li>
                  <li>corner marks added to the outer shell</li>
                  <li>body copy in Inter Tight, everything else mono</li>
                </ul>
              </div>
              <div style={{ marginTop: 8, color: "var(--accent)" }}>
                → Tap "runtime counterpart" to toggle the tag pathology menu.
              </div>
            </Note>
          </DCArtboard>
        </DCSection>

        <DCSection id="v2" title="V2 — COCKPIT-NATIVE · reshaped as a worker tile">
          <DCArtboard id="frank-v2" label="frank as a tile · sits in the cockpit grid" width={820} height={380}>
            <div style={{ padding: 14, background: "var(--bg)", height: "100%", boxSizing: "border-box" }}>
              <FrankCardV2 />
            </div>
          </DCArtboard>

          <DCArtboard id="frank-v2-notes" label="why this shape" width={360} height={380}>
            <Note hd="COCKPIT-NATIVE TAKE">
              <div>The original card is tall and portrait — but our cockpit is a horizontal grid of tiles. V2 rotates the information:</div>
              <ul style={{ margin: "6px 0 0 14px", padding: 0, color: "var(--ink-dim)" }}>
                <li>tile-head uses existing <code>stat</code> pills (STUCK / RAT)</li>
                <li>tabs + ctx bar collapse into a single meta strip</li>
                <li>thread becomes a cockpit stream (prefix → body)</li>
                <li>sentiment + achievements + quest + kill stack in a right sidebar — matches how worker tiles already work</li>
              </ul>
              <div style={{ marginTop: 8, color: "var(--accent)" }}>
                → This is the version that drops cleanly next to <code>WorkerTile</code> and <code>KernelCube</code>.
              </div>
            </Note>
          </DCArtboard>
        </DCSection>

        <DCSection id="v3" title="V3 — CROSSOVER · composer (image 2) in the system">
          <DCArtboard id="frank-v3" label="routing composer · slots + kbd" width={860} height={260}>
            <div style={{ padding: 18, background: "var(--bg)", height: "100%", boxSizing: "border-box" }}>
              <FrankComposerV3 />
            </div>
          </DCArtboard>

          <DCArtboard id="frank-v3-notes" label="how slots map" width={360} height={260}>
            <Note hd="COMPOSER — SLOT GRAMMAR">
              <div>
                <span className="hl" style={{color:"var(--blue)"}}>@ file</span> → blue · matches "you" role<br />
                <span className="hl" style={{color:"var(--warn)"}}>&#123;&#125; var</span> → warn · matches stuck/uncertainty<br />
                <span className="hl" style={{color:"var(--accent)"}}>⌘ cmd</span> → accent · active intent<br />
                <span className="hl" style={{color:"var(--ok)"}}>⎇ branch hint</span> → ok · verification color
              </div>
              <div style={{ marginTop: 8 }}>Follows the same slot-coloring the data explorer uses: the role IS the color.</div>
            </Note>
          </DCArtboard>
        </DCSection>

        <DCSection id="together" title="TOGETHER — stacked as they'd live in the cockpit">
          <DCArtboard id="stack" label="composer above, worker tile below" width={820} height={680}>
            <div style={{ padding: 14, background: "var(--bg)", height: "100%", boxSizing: "border-box", display: "flex", flexDirection: "column", gap: 10 }}>
              <FrankComposerV3 />
              <div style={{ flex: 1, minHeight: 0 }}>
                <FrankCardV2 />
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="next" label="what to pull forward" width={360} height={680}>
            <Note hd="OPEN QUESTIONS">
              <div>— Which translation feels right: <span style={{color:"var(--accent)"}}>V1 faithful</span>, <span style={{color:"var(--accent)"}}>V2 cockpit-native</span>, or the <span style={{color:"var(--accent)"}}>V3 composer</span> crossover?</div>
              <div>— Keep the left-gutter character column, or replace it with our tc-* heatmap (matches KernelCube)?</div>
              <div>— Keep "COUNTERFEITER" / "The Pane 6 Special" as pathology achievements, or wire them to the stats-tile leaderboard?</div>
              <div>— Sentiment: 5-button rating, a slider, or auto-inferred from the affect pill already on WorkerTile?</div>
              <div>— Multi-body tabs (Opus / Codex / Kimi): real switch, or a read-only status of concurrent backends?</div>
              <div>— Tag pathology menu inline on highlight — keep on lilac, or match the specific law color from the ticker?</div>
            </Note>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
