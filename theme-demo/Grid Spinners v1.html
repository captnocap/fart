<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Grid Spinners</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: oklch(0.97 0.005 80);
    --ink: oklch(0.2 0.01 80);
    --ink-2: oklch(0.4 0.01 80);
    --rule: oklch(0.88 0.005 80);
    --card: oklch(0.995 0.003 80);
    --accent: oklch(0.65 0.15 40);
    --accent-soft: oklch(0.9 0.04 40);
    --cell-on: var(--ink);
    --cell-off: oklch(0.92 0.005 80);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif; }
  body { min-height: 100vh; }

  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 56px 48px 80px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 40px;
  }
  .topbar h1 {
    margin: 0;
    font-size: 34px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .topbar .sub {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .topbar .right {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-2);
    text-align: right;
  }
  .topbar .right b { color: var(--ink); font-weight: 500; }

  .grid-outer {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }
  .tile {
    background: var(--card);
    padding: 28px 26px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 260px;
  }
  .tile header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .tile .name {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .tile .num {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    color: var(--ink-2);
    letter-spacing: 0.1em;
  }
  .tile .caption {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: var(--ink-2);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }
  .spinner-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 8px 0 4px;
  }

  /* Inner 3x3 grid — every spinner builds from this primitive */
  .mini {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: var(--gap, 4px);
    width: var(--size, 108px);
    height: var(--size, 108px);
  }
  .dot {
    background: var(--cell-off);
    border-radius: 1px;
    transition: background 120ms linear, transform 120ms linear;
  }
  .dot.on { background: var(--cell-on); }
  .dot.accent { background: var(--accent); }

  /* Footer */
  .foot {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: var(--ink-2);
    display: flex;
    justify-content: space-between;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* SNAKE */
  .snake .dot.head { background: var(--accent); }
  .snake .dot.body { background: var(--ink); }

  /* MINESWEEPER */
  .mines .dot {
    background: transparent;
    outline: 1px solid oklch(0.82 0.005 80);
    outline-offset: -1px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    font-weight: 600;
    color: transparent;
  }
  .mines .dot.revealed {
    outline: 1px solid oklch(0.7 0.005 80);
  }
  .mines .dot.n1 { color: oklch(0.5 0.15 250); }
  .mines .dot.n2 { color: oklch(0.5 0.15 150); }
  .mines .dot.n3 { color: var(--accent); }
  .mines .dot.boom { background: var(--accent); color: var(--bg); }

  /* TIC TAC TOE */
  .ttt .dot {
    background: transparent;
    border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk';
    font-weight: 400;
    font-size: 28px;
    line-height: 1;
  }
  .ttt .mark-x { color: var(--ink); }
  .ttt .mark-o { color: var(--accent); }
  .ttt .strike {
    position: absolute;
    background: var(--accent);
    height: 2px;
    transform-origin: left center;
    border-radius: 2px;
  }

  /* TETRIS */
  .tet .dot { background: var(--cell-off); }
  .tet .dot.a { background: var(--ink); }
  .tet .dot.b { background: var(--accent); }
  .tet .dot.c { background: oklch(0.45 0.01 80); }

  /* PULSE (rings) */
  .pulse .dot.r0 { background: var(--ink); }
  .pulse .dot.r1 { background: oklch(0.55 0.01 80); }
  .pulse .dot.r2 { background: var(--accent); }

  /* ORBIT */
  .orbit .dot.o { background: var(--ink); }
  .orbit .dot.trail { background: oklch(0.7 0.005 80); }
  .orbit .dot.o2 { background: var(--accent); }

  /* BINARY COUNT */
  .bin .dot { border-radius: 50%; }
  .bin .dot.on { background: var(--ink); }

  /* LIFE (cellular automaton) */
  .life .dot.on { background: var(--ink); }
  .life .dot.fresh { background: var(--accent); }

  /* SORT bars */
  .sort {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    width: 108px;
    height: 108px;
  }
  .sort .bar {
    flex: 1;
    background: var(--ink);
    transition: height 160ms cubic-bezier(.4,0,.2,1), background 160ms linear;
    border-radius: 1px 1px 0 0;
  }
  .sort .bar.active { background: var(--accent); }
</style>
</head>
<body>

<div class="page">
  <div class="topbar">
    <div>
      <div class="sub">specimen · twelve loading states</div>
      <h1 style="margin-top:8px">Grid&nbsp;Spinners</h1>
    </div>
    <div class="right">
      <div>sheet 01 / 01</div>
      <div><b id="clock">00:00:00</b></div>
    </div>
  </div>

  <div class="grid-outer" id="grid"></div>

  <div class="foot">
    <span>twelve variations · nested 3×3</span>
    <span id="tickFoot">t = 0</span>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="spinners.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
