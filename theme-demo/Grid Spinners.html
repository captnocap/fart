<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Grid Spinners · Twelve Loading States</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0b09;
  --bg-1: #14100d;
  --bg-2: #1a1511;
  --bg-3: #221b15;
  --ink: #f2e8dc;
  --ink-dim: #b8a890;
  --ink-dimmer: #7a6e5d;
  --ink-ghost: #4a4238;
  --rule: #3a2a1e;
  --rule-bright: #8a4a20;
  --accent: #d26a2a;
  --accent-hot: #e8501c;
  --ok: #6aa390;
  --warn: #d6a54a;
  --flag: #e14a2a;
  --grid-dot: rgba(138, 74, 32, 0.08);
  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', 'Menlo', monospace;
  --font-sans: 'Inter Tight', 'Inter', system-ui, sans-serif;

  /* Spinner cells map into this palette */
  --card: var(--bg-1);
  --cell-on: var(--ink);
  --cell-off: rgba(242, 232, 220, 0.06);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background:
    radial-gradient(circle at 1px 1px, var(--grid-dot) 1px, transparent 0) 0 0 / 18px 18px,
    var(--bg);
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.35;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ============ Page frame ============ */
.page { max-width: 1400px; margin: 0 auto; padding: 28px 36px 80px; }

.topbar {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 24px;
  align-items: end;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--rule-bright);
  margin-bottom: 4px;
}
.topbar .slug {
  font-size: 9px; color: var(--accent);
  letter-spacing: 0.24em; text-transform: uppercase; font-weight: 600;
}
.topbar h1 {
  font-family: var(--font-sans);
  font-size: 22px; font-weight: 500; letter-spacing: -0.01em;
  margin: 4px 0 0; color: var(--ink);
}
.topbar .spec {
  font-size: 9px; color: var(--ink-dimmer);
  letter-spacing: 0.12em; text-transform: uppercase;
  text-align: right; line-height: 1.6;
}
.topbar .spec b { color: var(--ink-dim); font-weight: 500; }
.topbar .meter {
  display: flex; align-items: center; gap: 6px;
  font-size: 9px; color: var(--ink-dimmer); letter-spacing: 0.12em;
  text-transform: uppercase; justify-self: center;
}
.topbar .meter .bar {
  width: 80px; height: 4px;
  background: var(--bg-2); border: 1px solid var(--rule);
  position: relative;
}
.topbar .meter .bar i {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--accent); width: 62%;
}

.tick-row {
  display: flex; justify-content: space-between;
  padding: 6px 0 22px;
  font-size: 9px; color: var(--ink-ghost); letter-spacing: 0.1em;
  font-variant-numeric: tabular-nums;
}

/* ============ Section ============ */
section { margin-bottom: 40px; }
.sec-head {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 14px;
  align-items: baseline;
  padding-bottom: 10px;
  margin-bottom: 18px;
  border-bottom: 1px solid var(--rule);
}
.sec-head .num { font-size: 9px; color: var(--accent); letter-spacing: 0.1em; font-weight: 600; }
.sec-head h2 {
  font-family: var(--font-sans);
  font-size: 15px; font-weight: 500; letter-spacing: -0.005em;
  margin: 0; color: var(--ink);
}
.sec-head .tag { font-size: 9px; color: var(--ink-dimmer); letter-spacing: 0.14em; text-transform: uppercase; }

/* ============ Grid of spinner tiles ============ */
.grid-outer {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}
.tile {
  background: var(--bg-1);
  padding: 14px 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 240px;
  position: relative;
}
/* corner marks on each tile */
.tile .corner {
  position: absolute; width: 6px; height: 6px;
  border-color: var(--rule-bright); border-style: solid; border-width: 0;
  pointer-events: none;
}
.tile .corner.tl { top: 2px; left: 2px; border-top-width: 1px; border-left-width: 1px; }
.tile .corner.tr { top: 2px; right: 2px; border-top-width: 1px; border-right-width: 1px; }
.tile .corner.bl { bottom: 2px; left: 2px; border-bottom-width: 1px; border-left-width: 1px; }
.tile .corner.br { bottom: 2px; right: 2px; border-bottom-width: 1px; border-right-width: 1px; }

.tile header {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 8px; padding-bottom: 8px;
  border-bottom: 1px dashed var(--rule);
}
.tile .name { font-size: 10px; color: var(--ink); letter-spacing: 0.04em; }
.tile .num { font-size: 8px; color: var(--accent); letter-spacing: 0.16em; font-weight: 600; }
.tile .caption {
  font-size: 8.5px; color: var(--ink-dimmer); letter-spacing: 0.1em;
  text-transform: uppercase; line-height: 1.5;
}
.spinner-wrap {
  display: flex; align-items: center; justify-content: center;
  flex: 1; padding: 10px 0 6px;
}

/* Inner 3x3 grid — every spinner builds from this primitive */
.mini {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: var(--gap, 4px);
  width: var(--size, 108px);
  height: var(--size, 108px);
}
.dot {
  background: var(--cell-off);
  transition: background 120ms linear, transform 120ms linear;
}
.dot.on { background: var(--cell-on); }
.dot.accent { background: var(--accent); }

/* Footer */
.foot {
  margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--rule);
  display: flex; justify-content: space-between;
  font-size: 9px; color: var(--ink-dimmer);
  letter-spacing: 0.12em; text-transform: uppercase;
}

/* SNAKE */
.snake .dot.head { background: var(--accent); }
.snake .dot.body { background: var(--ink); }

/* MINESWEEPER */
.mines .dot {
  background: transparent;
  outline: 1px solid var(--rule);
  outline-offset: -1px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  color: transparent;
}
.mines .dot.revealed { outline: 1px solid var(--rule-bright); }
.mines .dot.n1 { color: var(--blue, #5a8bd6); }
.mines .dot.n2 { color: var(--ok); }
.mines .dot.n3 { color: var(--accent); }
.mines .dot.boom { background: var(--flag); color: var(--bg); outline-color: var(--flag); }

/* TIC TAC TOE */
.ttt .dot {
  background: transparent;
  border: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-sans);
  font-weight: 400; font-size: 26px; line-height: 1;
}
.ttt .mark-x { color: var(--ink); }
.ttt .mark-o { color: var(--accent); }

/* TETRIS */
.tet .dot { background: var(--cell-off); }
.tet .dot.a { background: var(--ink); }
.tet .dot.b { background: var(--accent); }
.tet .dot.c { background: var(--ink-dim); }

/* PULSE (rings) */
.pulse .dot.r0 { background: var(--ink); }
.pulse .dot.r1 { background: var(--ink-dim); }
.pulse .dot.r2 { background: var(--accent); }

/* ORBIT */
.orbit .dot.o { background: var(--ink); }
.orbit .dot.trail { background: var(--ink-ghost); }
.orbit .dot.o2 { background: var(--accent); }

/* BINARY COUNT */
.bin .dot { border-radius: 0; }
.bin .dot.on { background: var(--ink); }

/* LIFE */
.life .dot.on { background: var(--ink); }
.life .dot.fresh { background: var(--accent); }

/* SORT bars */
.sort {
  display: flex; align-items: flex-end; gap: 3px;
  width: 108px; height: 108px;
}
.sort .bar {
  flex: 1;
  background: var(--ink);
  transition: height 160ms cubic-bezier(.4,0,.2,1), background 160ms linear;
}
.sort .bar.active { background: var(--accent); }
</style>
</head>
<body>

<div class="page">
  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="slug">specimen · 04 · loading states</div>
      <h1>Grid Spinners</h1>
    </div>
    <div class="meter">
      <span>tempo</span>
      <div class="bar"><i></i></div>
      <span style="color:var(--accent)">1.0×</span>
    </div>
    <div class="spec">
      <div><b>sheet</b> 04 / 04</div>
      <div><b>grid</b> 3×3 · nested</div>
      <div><b>clock</b> <span id="clock">00:00:00</span></div>
    </div>
  </div>
  <div class="tick-row">
    <span>01</span><span>02</span><span>03</span><span>04</span><span>05</span>
    <span>06</span><span>07</span><span>08</span><span>09</span><span>10</span>
    <span>11</span><span>12</span>
  </div>

  <section>
    <div class="sec-head">
      <div class="num">§ A</div>
      <h2>Twelve variations — nested 3×3</h2>
      <div class="tag">12 tiles · animated</div>
    </div>

    <div class="grid-outer" id="grid"></div>
  </section>

  <div class="foot">
    <span>twelve variations · nested 3×3 · shared tick</span>
    <span id="tickFoot">t = 0</span>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="spinners.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
