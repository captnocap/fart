<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spinner Shapes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: oklch(0.97 0.005 80);
    --ink: oklch(0.2 0.01 80);
    --ink-2: oklch(0.4 0.01 80);
    --rule: oklch(0.88 0.005 80);
    --card: oklch(0.995 0.003 80);
    --accent: oklch(0.65 0.15 40);
    --cell-off: oklch(0.92 0.005 80);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif; }
  .page { max-width: 1200px; margin: 0 auto; padding: 56px 48px 80px; }
  .topbar {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding-bottom: 24px; border-bottom: 1px solid var(--rule); margin-bottom: 48px;
  }
  .topbar h1 { margin: 8px 0 0; font-size: 34px; font-weight: 500; letter-spacing: -0.02em; }
  .topbar .sub {
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px;
    color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.12em;
  }
  .topbar .right {
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px;
    color: var(--ink-2); text-align: right;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }
  .tile {
    background: var(--card);
    padding: 32px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-height: 320px;
  }
  .tile header {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .tile .name { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
  .tile .num {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px; color: var(--ink-2); letter-spacing: 0.1em;
  }
  .tile .caption {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px; color: var(--ink-2); letter-spacing: 0.04em; line-height: 1.5;
  }
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 0;
  }

  .mini {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
  }
  .dot { background: transparent; }
  .foot {
    margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--rule);
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10.5px;
    color: var(--ink-2); display: flex; justify-content: space-between;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="page">
  <div class="topbar">
    <div>
      <div class="sub">specimen 02 · compositions</div>
      <h1>Spinner Shapes</h1>
    </div>
    <div class="right">
      <div>sheet 02 / 02</div>
      <div>1·3·5·7·9</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="foot">
    <span>six compositions · nested 3×3 units</span>
    <span>units compose · effects stay distinct</span>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shapes.jsx"></script>

</body>
</html>
