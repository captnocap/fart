<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>tsz</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas#canvas { cursor: default; }
  #v86-screen { position: fixed; bottom: 0; right: 0; width: 400px; height: 300px; border: 1px solid #333; z-index: 10; display: none; }
  #v86-screen canvas { width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="canvas" width="800" height="600"></canvas>
<div id="v86-screen"></div>

<script src="libv86.js"></script>
<script>
const canvas = document.getElementById('canvas');
let emulator = null;
let booted = false;
let serialBytes = 0;

async function init() {
  let device = null;
  if (navigator.gpu) {
    const adapter = await navigator.gpu.requestAdapter();
    if (adapter) device = await adapter.requestDevice();
  }

  if (device) {
    const ctx = canvas.getContext('webgpu');
    ctx.configure({ device, format: navigator.gpu.getPreferredCanvasFormat(), alphaMode: 'opaque' });
  }

  window.Module = {
    canvas: canvas,
    preinitializedWebGPUDevice: device,
    onRuntimeInitialized: function() {
      console.log('[tsz] wasm ready');
    }
  };

  const script = document.createElement('script');
  script.src = 'tsz-web.js';
  document.body.appendChild(script);
}

function bootLinux() {
  if (booted) return;
  booted = true;
  console.log('[tsz] booting v86...');

  // Show v86 VGA screen in corner for debugging
  document.getElementById('v86-screen').style.display = 'block';

  emulator = new V86({
    wasm_path: 'v86.wasm',
    bios: { url: 'seabios.bin' },
    vga_bios: { url: 'vgabios.bin' },
    bzimage: { url: 'tsz-kernel.bin' },
    cmdline: 'console=ttyS0,115200',
    memory_size: 32 * 1024 * 1024,
    vga_memory_size: 2 * 1024 * 1024,
    autostart: true,
  });

  // Serial output → wasm terminal buffer
  emulator.add_listener('serial0-output-byte', function(b) {
    if (Module && Module._web_serial_char) {
      Module._web_serial_char(b);
    }
  });

  emulator.add_listener('emulator-ready', function() {
    console.log('[v86] ready');
  });

  // Also try string listener
  emulator.add_listener('serial0-output-string', function(str) {
    console.log('[v86] serial string:', str);
  });

  // Progress check
  setTimeout(function() {
    console.log('[v86] 5s check — serial bytes received:', serialBytes);
    if (serialBytes === 0) {
      console.log('[v86] No serial output yet. Alpine may boot to VGA only. Check the v86 screen in bottom-right.');
    }
  }, 5000);

  setTimeout(function() {
    console.log('[v86] 15s check — serial bytes:', serialBytes);
  }, 15000);
}

// Click on canvas — boot button area or forward to wasm
canvas.addEventListener('click', function(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (!booted) {
    bootLinux();
    return;
  }

  if (Module && Module._web_click) {
    Module._web_click(x, y);
  }
});

document.addEventListener('keydown', function(e) {
  if (!booted && e.key === 'Enter') {
    bootLinux();
  }
});

init().catch(console.error);
</script>
</body>
</html>
