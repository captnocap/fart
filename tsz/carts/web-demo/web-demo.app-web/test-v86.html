<!DOCTYPE html>
<html>
<head><title>v86 — custom kernel</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:20px;">
<p id="status" style="font-size:20px;color:yellow;">Loading...</p>
<div style="display:flex;gap:20px;">
  <div>
    <h3>VGA</h3>
    <div id="screen" style="border:1px solid #333;width:640px;height:400px;overflow:hidden;"></div>
  </div>
  <div style="flex:1;">
    <h3>Serial (ttyS0)</h3>
    <pre id="serial" style="height:400px;overflow:auto;border:1px solid #0f0;padding:8px;color:#0f0;font-size:12px;"></pre>
  </div>
</div>
<script src="libv86.js"></script>
<script>
var bytes = 0;
var t0 = performance.now();
var emulator = new V86({
  wasm_path: 'v86.wasm',
  bios: { url: 'seabios.bin' },
  vga_bios: { url: 'vgabios.bin' },
  memory_size: 32 * 1024 * 1024,
  vga_memory_size: 2 * 1024 * 1024,
  screen_container: document.getElementById('screen'),
  bzimage: { url: 'tsz-kernel.bin' },
  cmdline: 'console=ttyS0,115200',
  autostart: true,
});
emulator.add_listener('emulator-ready', function() {
  document.getElementById('status').textContent = 'v86 ready (' + Math.round(performance.now() - t0) + 'ms)';
});
emulator.add_listener('serial0-output-byte', function(b) {
  bytes++;
  document.getElementById('serial').textContent += String.fromCharCode(b);
  document.getElementById('serial').scrollTop = 999999;
  document.getElementById('status').textContent = 'serial: ' + bytes + ' bytes (' + Math.round(performance.now() - t0) + 'ms)';
});
</script>
</body>
</html>
