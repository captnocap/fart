<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>tsz — flex layout + WebGPU rendering from Zig WASM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
  h1 { font-size: 16px; color: #58a6ff; }
  canvas { border: 1px solid #30363d; border-radius: 4px; }
  #log { font-size: 12px; white-space: pre; color: #8b949e; line-height: 1.6; max-width: 800px; width: 100%; }
  .pass { color: #3fb950; } .fail { color: #f85149; } .accent { color: #58a6ff; }
</style>
</head>
<body>
<h1>tsz — flex layout + WebGPU rendering (Zig WASM)</h1>
<canvas id="canvas" width="800" height="500"></canvas>
<div id="log"></div>

<script>
const logEl = document.getElementById('log');
function log(msg, cls) {
  const span = document.createElement('span');
  span.textContent = msg + '\n';
  if (cls) span.className = cls;
  logEl.appendChild(span);
}

// FlexDirection: row=0, column=1
const ROW = 0, COL = 1;
// AlignItems: start=0, center=1, end=2, stretch=3
const AI_START = 0, AI_CENTER = 1, AI_END = 2, AI_STRETCH = 3;
// JustifyContent: start=0, center=1, end=2, space_between=3
const JC_START = 0, JC_CENTER = 1, JC_END = 2, JC_BETWEEN = 3;

async function main() {
  // ── WebGPU init ─────────────────────────────────────────
  const useWebGPU = !!navigator.gpu;
  let device, ctx, pipeline, bindGroup, rectBuf, viewportBuf, format;
  const canvas = document.getElementById('canvas');

  if (useWebGPU) {
    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) { log('No WebGPU adapter — falling back to Canvas2D', 'accent'); }
    else {
      device = await adapter.requestDevice();
      ctx = canvas.getContext('webgpu');
      format = navigator.gpu.getPreferredCanvasFormat();
      ctx.configure({ device, format, alphaMode: 'premultiplied' });

      const shaderModule = device.createShaderModule({ code: `
        struct VSOut { @builtin(position) pos: vec4f, @location(0) color: vec4f };
        @group(0) @binding(0) var<uniform> viewport: vec2f;
        @vertex fn vs(@builtin(vertex_index) vi: u32,
          @location(0) rpos: vec2f, @location(1) rsize: vec2f, @location(2) rcol: vec4f) -> VSOut {
          let corners = array<vec2f,6>(vec2f(0,0),vec2f(1,0),vec2f(0,1),vec2f(1,0),vec2f(1,1),vec2f(0,1));
          let px = rpos + corners[vi] * rsize;
          let ndc = (px / viewport) * 2.0 - 1.0;
          var out: VSOut; out.pos = vec4f(ndc.x, -ndc.y, 0, 1); out.color = rcol; return out;
        }
        @fragment fn fs(in: VSOut) -> @location(0) vec4f { return in.color; }
      `});

      const bgl = device.createBindGroupLayout({
        entries: [{ binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } }],
      });
      pipeline = device.createRenderPipeline({
        layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
        vertex: { module: shaderModule, entryPoint: 'vs', buffers: [{
          arrayStride: 32, stepMode: 'instance',
          attributes: [
            { shaderLocation: 0, offset: 0, format: 'float32x2' },
            { shaderLocation: 1, offset: 8, format: 'float32x2' },
            { shaderLocation: 2, offset: 16, format: 'float32x4' },
          ],
        }]},
        fragment: { module: shaderModule, entryPoint: 'fs', targets: [{ format }] },
        primitive: { topology: 'triangle-list' },
      });
      viewportBuf = device.createBuffer({ size: 8, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
      device.queue.writeBuffer(viewportBuf, 0, new Float32Array([canvas.width, canvas.height]));
      bindGroup = device.createBindGroup({ layout: bgl, entries: [{ binding: 0, resource: { buffer: viewportBuf } }] });
      rectBuf = device.createBuffer({ size: 1024 * 32, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
      log('WebGPU initialized', 'pass');
    }
  }

  const ctx2d = (!device) ? canvas.getContext('2d') : null;
  if (ctx2d) log('Using Canvas2D fallback', 'accent');

  // ── WASM import shim ────────────────────────────────────
  let frameRects = [];
  const textDecoder = new TextDecoder();
  let wasmMemory = null;

  const importObject = { env: {
    gpu_begin_frame: () => { frameRects = []; },
    gpu_draw_rect: (x, y, w, h, r, g, b, a) => { frameRects.push(x, y, w, h, r, g, b, a); },
    gpu_end_frame: () => {
      if (frameRects.length === 0) return;
      const count = frameRects.length / 8;
      if (device) {
        device.queue.writeBuffer(rectBuf, 0, new Float32Array(frameRects));
        const enc = device.createCommandEncoder();
        const pass = enc.beginRenderPass({ colorAttachments: [{
          view: ctx.getCurrentTexture().createView(),
          clearValue: { r: 0.051, g: 0.067, b: 0.090, a: 1 }, loadOp: 'clear', storeOp: 'store',
        }]});
        pass.setPipeline(pipeline); pass.setBindGroup(0, bindGroup);
        pass.setVertexBuffer(0, rectBuf); pass.draw(6, count); pass.end();
        device.queue.submit([enc.finish()]);
      } else {
        ctx2d.fillStyle = '#0d1117'; ctx2d.fillRect(0, 0, 800, 500);
        for (let i = 0; i < frameRects.length; i += 8) {
          const [x,y,w,h,r,g,b,a] = frameRects.slice(i, i+8);
          ctx2d.fillStyle = `rgba(${r*255|0},${g*255|0},${b*255|0},${a})`;
          ctx2d.fillRect(x, y, w, h);
        }
      }
    },
    gpu_log: (ptr, len) => {
      if (!wasmMemory) return;
      log('[wasm] ' + textDecoder.decode(new Uint8Array(wasmMemory.buffer, ptr, len)), 'accent');
    },
  }};

  // ── Load WASM ───────────────────────────────────────────
  log('Loading tsz-gpu.wasm...');
  const resp = await fetch('zig-out/bin/tsz-gpu.wasm');
  const bytes = await resp.arrayBuffer();
  const { instance } = await WebAssembly.instantiate(bytes, importObject);
  const w = instance.exports;
  wasmMemory = w.memory;
  log('WASM loaded (' + (bytes.byteLength / 1024).toFixed(0) + ' KB)', 'accent');

  // ── Build a dashboard layout ────────────────────────────
  // Everything below is pure WASM calls. Layout computed in Zig.
  w.node_reset();

  // Nodes
  const root     = w.node_create(); // 0 - shell
  const titlebar = w.node_create(); // 1
  const tabrow   = w.node_create(); // 2
  const content  = w.node_create(); // 3
  const card1    = w.node_create(); // 4
  const card2    = w.node_create(); // 5
  const card3    = w.node_create(); // 6
  const sidebar  = w.node_create(); // 7
  const main_    = w.node_create(); // 8
  const statusbar= w.node_create(); // 9
  const tab1     = w.node_create(); // 10
  const tab2     = w.node_create(); // 11
  const tab3     = w.node_create(); // 12
  const btn1     = w.node_create(); // 13
  const dot1     = w.node_create(); // 14

  // Root — full window, column
  w.node_set_width(root, 800); w.node_set_height(root, 500);
  w.node_set_flex_direction(root, COL);
  w.node_set_color(root, 0.051, 0.067, 0.090, 1);

  // Title bar — height 40, row, centered
  w.node_set_height(titlebar, 40);
  w.node_set_flex_direction(titlebar, ROW);
  w.node_set_align_items(titlebar, AI_CENTER);
  w.node_set_padding(titlebar, 10, 16, 10, 16);
  w.node_set_color(titlebar, 0.086, 0.106, 0.133, 1);

  // Tab row — height 36, row
  w.node_set_height(tabrow, 36);
  w.node_set_flex_direction(tabrow, ROW);
  w.node_set_padding(tabrow, 0, 8, 0, 8);
  w.node_set_gap(tabrow, 0);
  w.node_set_color(tabrow, 0.086, 0.106, 0.133, 1);

  // Tabs
  w.node_set_width(tab1, 96); w.node_set_height(tab1, 36);
  w.node_set_color(tab1, 0.110, 0.133, 0.161, 1); // active
  w.node_set_width(tab2, 88); w.node_set_height(tab2, 36);
  w.node_set_color(tab2, 0, 0, 0, 0); // inactive — transparent
  w.node_set_width(tab3, 80); w.node_set_height(tab3, 36);
  w.node_set_color(tab3, 0, 0, 0, 0);

  // Content — flexGrow 1, row, gap 12, padding 16
  w.node_set_flex_grow(content, 1);
  w.node_set_flex_direction(content, ROW);
  w.node_set_gap(content, 12);
  w.node_set_padding(content, 16, 16, 16, 16);
  w.node_set_color(content, 0, 0, 0, 0);

  // Sidebar — width 200, column, gap 8
  w.node_set_width(sidebar, 200);
  w.node_set_flex_direction(sidebar, COL);
  w.node_set_gap(sidebar, 8);
  w.node_set_padding(sidebar, 8, 8, 8, 8);
  w.node_set_color(sidebar, 0.086, 0.106, 0.133, 1);

  // Main — flexGrow 1, column, gap 8
  w.node_set_flex_grow(main_, 1);
  w.node_set_flex_direction(main_, COL);
  w.node_set_gap(main_, 8);
  w.node_set_padding(main_, 8, 8, 8, 8);
  w.node_set_color(main_, 0, 0, 0, 0);

  // Cards in main area
  w.node_set_height(card1, 100);
  w.node_set_color(card1, 0.086, 0.106, 0.133, 1);
  w.node_set_height(card2, 100);
  w.node_set_color(card2, 0.086, 0.106, 0.133, 1);
  w.node_set_flex_grow(card3, 1);
  w.node_set_color(card3, 0.086, 0.106, 0.133, 1);

  // Button inside sidebar
  w.node_set_height(btn1, 28);
  w.node_set_color(btn1, 0.345, 0.651, 1.0, 1);

  // Dot indicator
  w.node_set_width(dot1, 8); w.node_set_height(dot1, 8);
  w.node_set_color(dot1, 0.247, 0.725, 0.314, 1);

  // Status bar — height 24
  w.node_set_height(statusbar, 24);
  w.node_set_flex_direction(statusbar, ROW);
  w.node_set_align_items(statusbar, AI_CENTER);
  w.node_set_padding(statusbar, 4, 12, 4, 12);
  w.node_set_color(statusbar, 0.086, 0.106, 0.133, 1);

  // Wire tree
  w.node_add_child(tabrow, tab1);
  w.node_add_child(tabrow, tab2);
  w.node_add_child(tabrow, tab3);
  w.node_add_child(sidebar, btn1);
  w.node_add_child(sidebar, dot1);
  w.node_add_child(main_, card1);
  w.node_add_child(main_, card2);
  w.node_add_child(main_, card3);
  w.node_add_child(content, sidebar);
  w.node_add_child(content, main_);
  w.node_add_child(root, titlebar);
  w.node_add_child(root, tabrow);
  w.node_add_child(root, content);
  w.node_add_child(root, statusbar);

  // ── Compute layout ──────────────────────────────────────
  const t0 = performance.now();
  w.layout_compute(root, 800, 500);
  const layoutMs = (performance.now() - t0).toFixed(3);
  log('Layout computed in ' + layoutMs + 'ms (' + w.get_node_count() + ' nodes)', 'pass');

  // Print computed positions
  const names = ['Root','TitleBar','TabRow','Content','Card1','Card2','Card3',
                 'Sidebar','Main','StatusBar','Tab1','Tab2','Tab3','Button','Dot'];
  for (let i = 0; i < w.get_node_count(); i++) {
    const x = w.node_get_x(i), y = w.node_get_y(i);
    const nw = w.node_get_w(i), nh = w.node_get_h(i);
    log('  ' + (names[i]||'?').padEnd(12) + nw.toFixed(0).padStart(4) + 'x' + nh.toFixed(0).padEnd(4) +
        ' @ ' + x.toFixed(0) + ',' + y.toFixed(0));
  }

  // ── Render ──────────────────────────────────────────────
  const t1 = performance.now();
  w.render();
  const renderMs = (performance.now() - t1).toFixed(3);
  log('');
  log('Rendered in ' + renderMs + 'ms via ' + (device ? 'WebGPU' : 'Canvas2D'), 'pass');
  log('Full pipeline: Zig layout engine + ' + (device ? 'WebGPU' : 'Canvas2D') + ' rendering from WASM', 'pass');

  // ── Text overlay via Canvas2D ───────────────────────────
  // WebGPU doesn't have text natively. Overlay a 2D canvas for labels.
  const textCanvas = document.createElement('canvas');
  textCanvas.width = 800; textCanvas.height = 500;
  textCanvas.style.cssText = 'position:absolute;pointer-events:none;';
  canvas.style.position = 'relative';
  canvas.parentElement.style.position = 'relative';
  canvas.parentElement.insertBefore(textCanvas, canvas.nextSibling);
  textCanvas.style.marginTop = '-504px'; // overlay on canvas (500 + border)

  const tctx = textCanvas.getContext('2d');
  tctx.font = '12px monospace';
  tctx.fillStyle = '#e6edf3';
  tctx.fillText('tsz tools', w.node_get_x(1) + 16, w.node_get_y(1) + 24);
  tctx.fillStyle = '#8b949e';
  tctx.font = '11px monospace';
  tctx.fillText('v0.1.0', w.node_get_x(1) + w.node_get_w(1) - 60, w.node_get_y(1) + 24);

  tctx.fillStyle = '#e6edf3'; tctx.font = '11px monospace';
  tctx.fillText('Dashboard', w.node_get_x(10) + 12, w.node_get_y(10) + 22);
  tctx.fillStyle = '#8b949e';
  tctx.fillText('Inspector', w.node_get_x(11) + 12, w.node_get_y(11) + 22);
  tctx.fillText('Crashes', w.node_get_x(12) + 12, w.node_get_y(12) + 22);

  tctx.fillStyle = '#0d1117'; tctx.font = '10px monospace';
  tctx.fillText('Build', w.node_get_x(13) + 8, w.node_get_y(13) + 18);

  tctx.fillStyle = '#8b949e'; tctx.font = '9px monospace';
  tctx.fillText('tsz  |  Zig 0.15.2  |  wgpu + WASM', w.node_get_x(9) + 12, w.node_get_y(9) + 15);
}

main().catch(e => { log('ERROR: ' + e.message, 'fail'); log(e.stack, 'fail'); });
</script>
</body>
</html>
