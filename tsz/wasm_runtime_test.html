<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>tsz runtime — QuickJS + layout + WebGPU in WASM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
  h1 { font-size: 16px; color: #58a6ff; }
  canvas { border: 1px solid #30363d; border-radius: 4px; }
  #log { font-size: 12px; white-space: pre; color: #8b949e; line-height: 1.6; max-width: 800px; width: 100%; }
  .pass { color: #3fb950; } .fail { color: #f85149; } .accent { color: #58a6ff; }
  #editor { width: 800px; height: 200px; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; font-family: monospace; font-size: 13px; padding: 12px; resize: vertical; }
  button { background: #238636; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; font-family: monospace; font-size: 13px; cursor: pointer; }
  button:hover { background: #2ea043; }
  .row { display: flex; gap: 8px; align-items: center; }
</style>
</head>
<body>
<h1>tsz runtime — QuickJS + Zig layout + WebGPU (all in WASM)</h1>
<canvas id="canvas" width="800" height="500"></canvas>
<div class="row">
  <button onclick="runCode()">Run (Ctrl+Enter)</button>
  <span style="color:#8b949e;font-size:11px">JS runs inside QuickJS-in-WASM, not the browser JS engine</span>
</div>
<textarea id="editor">// tsz runtime — JS inside QuickJS-in-WASM
// Text, layout, click handlers — all WASM-side

Node.reset();
let clickCount = 0;

// Root
const root = Node.create();
Node.setWidth(root, 800); Node.setHeight(root, 500);
Node.setFlexDirection(root, COL);
Node.setColor(root, 0.051, 0.067, 0.090, 1);

// Title bar
const titlebar = Node.create();
Node.setHeight(titlebar, 40);
Node.setFlexDirection(titlebar, ROW);
Node.setAlignItems(titlebar, ALIGN_CENTER);
Node.setPadding(titlebar, 10, 16, 10, 16);
Node.setColor(titlebar, 0.086, 0.106, 0.133, 1);
Node.setText(titlebar, 'tsz runtime');
Node.setTextPadding(titlebar, 16, 12);

// Tab row
const tabrow = Node.create();
Node.setHeight(tabrow, 36);
Node.setFlexDirection(tabrow, ROW);
Node.setPadding(tabrow, 0, 8, 0, 8);
Node.setColor(tabrow, 0.086, 0.106, 0.133, 1);

const tab1 = Node.create();
Node.setWidth(tab1, 96); Node.setHeight(tab1, 36);
Node.setColor(tab1, 0.110, 0.133, 0.161, 1);
Node.setText(tab1, 'Dashboard');
Node.setFontSize(tab1, 11); Node.setTextPadding(tab1, 12, 10);

const tab2 = Node.create();
Node.setWidth(tab2, 88); Node.setHeight(tab2, 36);
Node.setText(tab2, 'Inspector');
Node.setFontSize(tab2, 11); Node.setTextPadding(tab2, 12, 10);
Node.setTextColor(tab2, 0.55, 0.58, 0.62, 1);

const tab3 = Node.create();
Node.setWidth(tab3, 80); Node.setHeight(tab3, 36);
Node.setText(tab3, 'Console');
Node.setFontSize(tab3, 11); Node.setTextPadding(tab3, 12, 10);
Node.setTextColor(tab3, 0.55, 0.58, 0.62, 1);

// Content
const content = Node.create();
Node.setFlexGrow(content, 1);
Node.setFlexDirection(content, ROW);
Node.setGap(content, 12);
Node.setPadding(content, 16, 16, 16, 16);

// Sidebar
const sidebar = Node.create();
Node.setWidth(sidebar, 200);
Node.setFlexDirection(sidebar, COL);
Node.setGap(sidebar, 8);
Node.setPadding(sidebar, 8, 8, 8, 8);
Node.setColor(sidebar, 0.086, 0.106, 0.133, 1);

// Click-counting button
const btn = Node.create();
Node.setHeight(btn, 28);
Node.setColor(btn, 0.345, 0.651, 1.0, 1);
Node.setText(btn, 'Click me!');
Node.setFontSize(btn, 10);
Node.setTextColor(btn, 0.05, 0.07, 0.09, 1);
Node.setTextPadding(btn, 8, 8);
Node.onClick(btn, (id, x, y) => {
  clickCount++;
  console.log('Button clicked! count=' + clickCount);
});

// Status dot
const dot = Node.create();
Node.setWidth(dot, 8); Node.setHeight(dot, 8);
Node.setColor(dot, 0.247, 0.725, 0.314, 1);

// Main
const main_ = Node.create();
Node.setFlexGrow(main_, 1);
Node.setFlexDirection(main_, COL);
Node.setGap(main_, 8);
Node.setPadding(main_, 8, 8, 8, 8);

// Cards with text
const card1 = Node.create();
Node.setHeight(card1, 100);
Node.setColor(card1, 0.086, 0.106, 0.133, 1);
Node.setText(card1, 'QuickJS + Zig Layout + WebGPU');
Node.setTextPadding(card1, 12, 12);

const card2 = Node.create();
Node.setHeight(card2, 100);
Node.setColor(card2, 0.086, 0.106, 0.133, 1);
Node.setText(card2, 'All running inside WASM');
Node.setTextPadding(card2, 12, 12);
Node.setTextColor(card2, 0.55, 0.58, 0.62, 1);

const card3 = Node.create();
Node.setFlexGrow(card3, 1);
Node.setColor(card3, 0.086, 0.106, 0.133, 1);
Node.setText(card3, 'Browser is just a framebuffer');
Node.setTextPadding(card3, 12, 12);
Node.setTextColor(card3, 0.35, 0.65, 1.0, 1);

// Status bar
const statusbar = Node.create();
Node.setHeight(statusbar, 24);
Node.setFlexDirection(statusbar, ROW);
Node.setAlignItems(statusbar, ALIGN_CENTER);
Node.setPadding(statusbar, 4, 12, 4, 12);
Node.setColor(statusbar, 0.086, 0.106, 0.133, 1);
Node.setText(statusbar, 'tsz | QuickJS | Zig 0.15.2 | WASM');
Node.setFontSize(statusbar, 9);
Node.setTextPadding(statusbar, 12, 7);
Node.setTextColor(statusbar, 0.55, 0.58, 0.62, 1);

// Wire tree
Node.addChild(tabrow, tab1);
Node.addChild(tabrow, tab2);
Node.addChild(tabrow, tab3);
Node.addChild(sidebar, btn);
Node.addChild(sidebar, dot);
Node.addChild(main_, card1);
Node.addChild(main_, card2);
Node.addChild(main_, card3);
Node.addChild(content, sidebar);
Node.addChild(content, main_);
Node.addChild(root, titlebar);
Node.addChild(root, tabrow);
Node.addChild(root, content);
Node.addChild(root, statusbar);

// Compute + render
Layout.compute(root, 800, 500);
Render.frame();

console.log(Node.count() + ' nodes, text + click handlers active');
</textarea>
<div id="log"></div>

<script>
const logEl = document.getElementById('log');
function log(msg, cls) {
  const span = document.createElement('span');
  span.textContent = msg + '\n';
  if (cls) span.className = cls;
  logEl.appendChild(span);
}

let wasm = null;
let wasmMemory = null;

async function main() {
  // ── WebGPU init ─────────────────────────────────────────
  const useWebGPU = !!navigator.gpu;
  let device, gpuCtx, pipeline, bindGroup, rectBuf, viewportBuf, format;
  const canvas = document.getElementById('canvas');

  if (useWebGPU) {
    const adapter = await navigator.gpu.requestAdapter();
    if (adapter) {
      device = await adapter.requestDevice();
      gpuCtx = canvas.getContext('webgpu');
      format = navigator.gpu.getPreferredCanvasFormat();
      gpuCtx.configure({ device, format, alphaMode: 'premultiplied' });

      const shaderModule = device.createShaderModule({ code: `
        struct VSOut { @builtin(position) pos: vec4f, @location(0) color: vec4f };
        @group(0) @binding(0) var<uniform> viewport: vec2f;
        @vertex fn vs(@builtin(vertex_index) vi: u32,
          @location(0) rpos: vec2f, @location(1) rsize: vec2f, @location(2) rcol: vec4f) -> VSOut {
          let corners = array<vec2f,6>(vec2f(0,0),vec2f(1,0),vec2f(0,1),vec2f(1,0),vec2f(1,1),vec2f(0,1));
          let px = rpos + corners[vi] * rsize;
          let ndc = (px / viewport) * 2.0 - 1.0;
          var out: VSOut; out.pos = vec4f(ndc.x, -ndc.y, 0, 1); out.color = rcol; return out;
        }
        @fragment fn fs(in: VSOut) -> @location(0) vec4f { return in.color; }
      `});

      const bgl = device.createBindGroupLayout({
        entries: [{ binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } }],
      });
      pipeline = device.createRenderPipeline({
        layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
        vertex: { module: shaderModule, entryPoint: 'vs', buffers: [{
          arrayStride: 32, stepMode: 'instance',
          attributes: [
            { shaderLocation: 0, offset: 0, format: 'float32x2' },
            { shaderLocation: 1, offset: 8, format: 'float32x2' },
            { shaderLocation: 2, offset: 16, format: 'float32x4' },
          ],
        }]},
        fragment: { module: shaderModule, entryPoint: 'fs', targets: [{ format }] },
        primitive: { topology: 'triangle-list' },
      });
      viewportBuf = device.createBuffer({ size: 8, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
      device.queue.writeBuffer(viewportBuf, 0, new Float32Array([canvas.width, canvas.height]));
      bindGroup = device.createBindGroup({ layout: bgl, entries: [{ binding: 0, resource: { buffer: viewportBuf } }] });
      rectBuf = device.createBuffer({ size: 4096 * 32, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
      log('WebGPU initialized', 'pass');
    }
  }

  const ctx2d = (!device) ? canvas.getContext('2d') : null;
  if (ctx2d) log('Using Canvas2D fallback', 'accent');

  // ── WASI shim + GPU imports ────────────────────────────
  let frameRects = [];
  const textDecoder = new TextDecoder();
  const textEncoder = new TextEncoder();

  // Minimal WASI shim — QuickJS needs fd_write, fd_close, proc_exit, etc.
  const wasiShim = {
    fd_write(fd, iovs_ptr, iovs_len, nwritten_ptr) {
      if (!wasmMemory) return 0;
      const mem = new DataView(wasmMemory.buffer);
      let written = 0;
      for (let i = 0; i < iovs_len; i++) {
        const ptr = mem.getUint32(iovs_ptr + i * 8, true);
        const len = mem.getUint32(iovs_ptr + i * 8 + 4, true);
        const bytes = new Uint8Array(wasmMemory.buffer, ptr, len);
        const str = textDecoder.decode(bytes);
        if (fd === 1 || fd === 2) log('[qjs] ' + str.trimEnd(), 'accent');
        written += len;
      }
      mem.setUint32(nwritten_ptr, written, true);
      return 0;
    },
    fd_read() { return 8; }, // EBADF
    fd_close() { return 0; },
    fd_seek() { return 0; },
    fd_fdstat_get(fd, buf) {
      if (!wasmMemory) return 8;
      const mem = new DataView(wasmMemory.buffer);
      mem.setUint8(buf, fd <= 2 ? 2 : 4); // character device or regular
      mem.setUint16(buf + 2, 0, true);
      mem.setBigUint64(buf + 8, 0n, true);
      mem.setBigUint64(buf + 16, 0n, true);
      return 0;
    },
    fd_prestat_get() { return 8; },
    fd_prestat_dir_name() { return 8; },
    proc_exit(code) { log('[wasi] proc_exit(' + code + ')', code ? 'fail' : 'pass'); },
    environ_sizes_get(count_ptr, buf_size_ptr) {
      if (!wasmMemory) return 0;
      const mem = new DataView(wasmMemory.buffer);
      mem.setUint32(count_ptr, 0, true);
      mem.setUint32(buf_size_ptr, 0, true);
      return 0;
    },
    environ_get() { return 0; },
    args_sizes_get(argc_ptr, argv_buf_size_ptr) {
      if (!wasmMemory) return 0;
      const mem = new DataView(wasmMemory.buffer);
      mem.setUint32(argc_ptr, 0, true);
      mem.setUint32(argv_buf_size_ptr, 0, true);
      return 0;
    },
    args_get() { return 0; },
    clock_time_get(id, precision, time_ptr) {
      if (!wasmMemory) return 0;
      const mem = new DataView(wasmMemory.buffer);
      mem.setBigUint64(time_ptr, BigInt(Date.now()) * 1000000n, true);
      return 0;
    },
    clock_res_get(id, res_ptr) {
      if (!wasmMemory) return 0;
      const mem = new DataView(wasmMemory.buffer);
      mem.setBigUint64(res_ptr, 1000000n, true);
      return 0;
    },
    random_get(buf, len) {
      if (!wasmMemory) return 0;
      const bytes = new Uint8Array(wasmMemory.buffer, buf, len);
      crypto.getRandomValues(bytes);
      return 0;
    },
    path_open() { return 44; }, // ENOSYS
    path_filestat_get() { return 44; },
    poll_oneoff() { return 44; },
    sched_yield() { return 0; },
  };

  // ── Text overlay canvas ────────────────────────────────
  // Wrap canvas in a positioned container so overlay aligns perfectly
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:relative;display:inline-block;';
  canvas.parentElement.insertBefore(wrapper, canvas);
  wrapper.appendChild(canvas);
  const textCanvas = document.createElement('canvas');
  textCanvas.width = 800; textCanvas.height = 500;
  textCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
  wrapper.appendChild(textCanvas);
  const tctx = textCanvas.getContext('2d');

  let frameTexts = [];

  const importObject = {
    wasi_snapshot_preview1: wasiShim,
    env: {
      gpu_begin_frame: () => { frameRects = []; frameTexts = []; },
      gpu_draw_rect: (x, y, w, h, r, g, b, a) => { frameRects.push(x, y, w, h, r, g, b, a); },
      gpu_draw_text: (x, y, ptr, len, size, r, g, b, a) => {
        if (!wasmMemory) return;
        const str = textDecoder.decode(new Uint8Array(wasmMemory.buffer, ptr, len));
        frameTexts.push({ x, y, str, size, r, g, b, a });
      },
      gpu_end_frame: () => {
        // Draw rects
        if (device) {
          if (frameRects.length > 0) {
            const count = frameRects.length / 8;
            device.queue.writeBuffer(rectBuf, 0, new Float32Array(frameRects));
            const enc = device.createCommandEncoder();
            const pass = enc.beginRenderPass({ colorAttachments: [{
              view: gpuCtx.getCurrentTexture().createView(),
              clearValue: { r: 0.051, g: 0.067, b: 0.090, a: 1 }, loadOp: 'clear', storeOp: 'store',
            }]});
            pass.setPipeline(pipeline); pass.setBindGroup(0, bindGroup);
            pass.setVertexBuffer(0, rectBuf); pass.draw(6, count); pass.end();
            device.queue.submit([enc.finish()]);
          }
        } else if (ctx2d) {
          ctx2d.fillStyle = '#0d1117'; ctx2d.fillRect(0, 0, 800, 500);
          for (let i = 0; i < frameRects.length; i += 8) {
            const [x,y,w,h,r,g,b,a] = frameRects.slice(i, i+8);
            ctx2d.fillStyle = `rgba(${r*255|0},${g*255|0},${b*255|0},${a})`;
            ctx2d.fillRect(x, y, w, h);
          }
        }
        // Draw text on overlay
        tctx.clearRect(0, 0, 800, 500);
        for (const t of frameTexts) {
          tctx.font = `${t.size}px monospace`;
          tctx.fillStyle = `rgba(${t.r*255|0},${t.g*255|0},${t.b*255|0},${t.a})`;
          tctx.fillText(t.str, t.x, t.y);
        }
      },
      gpu_log: (ptr, len) => {
        if (!wasmMemory) return;
        log(textDecoder.decode(new Uint8Array(wasmMemory.buffer, ptr, len)), 'accent');
      },
      gpu_canvas_width: () => canvas.width,
      gpu_canvas_height: () => canvas.height,
    },
  };

  // ── Load WASM ───────────────────────────────────────────
  log('Loading tsz-runtime.wasm (QuickJS + Zig layout + WebGPU)...');
  const resp = await fetch('zig-out/bin/tsz-runtime.wasm');
  const bytes = await resp.arrayBuffer();
  const { instance } = await WebAssembly.instantiate(bytes, importObject);
  wasm = instance.exports;
  wasmMemory = wasm.memory;
  log('WASM loaded (' + (bytes.byteLength / 1024).toFixed(0) + ' KB)', 'accent');

  // ── Initialize QuickJS runtime ─────────────────────────
  const t0 = performance.now();
  const rc = wasm.rt_init();
  const initMs = (performance.now() - t0).toFixed(1);
  if (rc !== 0) {
    log('rt_init failed: ' + rc, 'fail');
    return;
  }
  log('QuickJS initialized in ' + initMs + 'ms', 'pass');

  // ── Wire input events ───────────────────────────────────
  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    wasm.rt_mouse_event(e.clientX - rect.left, e.clientY - rect.top, 1);
  });
  canvas.addEventListener('mouseup', e => {
    const rect = canvas.getBoundingClientRect();
    wasm.rt_mouse_event(e.clientX - rect.left, e.clientY - rect.top, 2);
  });
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    wasm.rt_mouse_event(e.clientX - rect.left, e.clientY - rect.top, 0);
  });
  document.addEventListener('keydown', e => {
    wasm.rt_key_event(e.keyCode, 0);
  });
  document.addEventListener('keyup', e => {
    wasm.rt_key_event(e.keyCode, 1);
  });

  // ── Run the default code ───────────────────────────────
  runCode();
}

function runCode() {
  if (!wasm) return;
  logEl.innerHTML = '';
  const code = document.getElementById('editor').value;
  // Wrap in IIFE so const/let declarations don't collide across evals
  const wrapped = '(function(){\n' + code + '\n})();';
  const encoded = new TextEncoder().encode(wrapped);

  // Allocate in WASM memory — we'll write right after the current memory.data_end
  // Simple approach: use a fixed scratch area at a high address
  const SCRATCH = 1024 * 1024; // 1MB offset — well past static data
  const mem = new Uint8Array(wasmMemory.buffer);
  // Grow memory if needed
  const needed = SCRATCH + encoded.length + 1;
  if (needed > mem.length) {
    const pages = Math.ceil((needed - mem.length) / 65536);
    wasm.memory.grow(pages);
  }
  const fresh = new Uint8Array(wasmMemory.buffer);
  fresh.set(encoded, SCRATCH);
  fresh[SCRATCH + encoded.length] = 0;

  const t0 = performance.now();
  const rc = wasm.rt_eval(SCRATCH, encoded.length);
  const evalMs = (performance.now() - t0).toFixed(1);

  if (rc === 0) {
    log('Evaluated in ' + evalMs + 'ms', 'pass');
  } else {
    log('Eval error (rc=' + rc + ') in ' + evalMs + 'ms', 'fail');
  }
}

// Ctrl+Enter to run
document.getElementById('editor').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    runCode();
  }
});

main().catch(e => { log('ERROR: ' + e.message, 'fail'); log(e.stack, 'fail'); });
</script>
</body>
</html>
