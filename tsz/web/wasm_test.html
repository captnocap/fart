<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>tsz layout engine — WASM proof</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: monospace; padding: 20px; }
  h1 { font-size: 16px; margin-bottom: 12px; color: #58a6ff; }
  #canvas { border: 1px solid #30363d; border-radius: 4px; }
  #log { margin-top: 12px; font-size: 12px; white-space: pre; color: #8b949e; line-height: 1.6; }
  .pass { color: #3fb950; }
  .fail { color: #f85149; }
  .accent { color: #58a6ff; }
</style>
</head>
<body>
<h1>tsz layout engine running in WASM</h1>
<canvas id="canvas" width="800" height="500"></canvas>
<div id="log"></div>

<script>
const log = document.getElementById('log');
function print(msg, cls) {
  const span = document.createElement('span');
  span.textContent = msg + '\n';
  if (cls) span.className = cls;
  log.appendChild(span);
}

async function main() {
  print('Loading tsz-layout.wasm...');
  const resp = await fetch('zig-out/bin/tsz-layout.wasm');
  const bytes = await resp.arrayBuffer();
  const { instance } = await WebAssembly.instantiate(bytes, { env: {} });
  const wasm = instance.exports;
  print('WASM loaded. Exports: ' + Object.keys(wasm).filter(k => typeof wasm[k] === 'function').join(', '), 'accent');

  // ── Build a test tree ──────────────────────────────────────
  // Root: 800x500 column, padding 16
  // ├─ Header: height 48, row, padding 12
  // ├─ Content: flexGrow 1, row, gap 12, padding 12
  // │  ├─ Sidebar: width 200
  // │  └─ Main: flexGrow 1
  // └─ Footer: height 32

  wasm.node_reset();

  const root    = wasm.node_create();  // 0
  const header  = wasm.node_create();  // 1
  const content = wasm.node_create();  // 2
  const sidebar = wasm.node_create();  // 3
  const main_   = wasm.node_create();  // 4
  const footer  = wasm.node_create();  // 5

  // Root — column, 800x500, padding 0
  wasm.node_set_width(root, 800);
  wasm.node_set_height(root, 500);
  wasm.node_set_flex_direction(root, 1); // row=0, column=1

  // Header — height 48, row
  wasm.node_set_height(header, 48);
  wasm.node_set_flex_direction(header, 0); // row=0
  wasm.node_set_padding(header, 12, 12, 12, 12);

  // Content — flexGrow 1, row, gap 12
  wasm.node_set_flex_grow(content, 1);
  wasm.node_set_flex_direction(content, 0); // row=0
  wasm.node_set_gap(content, 12);
  wasm.node_set_padding(content, 12, 12, 12, 12);

  // Sidebar — width 200
  wasm.node_set_width(sidebar, 200);

  // Main — flexGrow 1
  wasm.node_set_flex_grow(main_, 1);

  // Footer — height 32
  wasm.node_set_height(footer, 32);

  // Wire children
  wasm.node_add_child(content, sidebar);
  wasm.node_add_child(content, main_);
  wasm.node_add_child(root, header);
  wasm.node_add_child(root, content);
  wasm.node_add_child(root, footer);

  // ── Run layout ─────────────────────────────────────────────
  const t0 = performance.now();
  wasm.layout_compute(root, 800, 500);
  const elapsed = (performance.now() - t0).toFixed(2);

  print(`Layout computed in ${elapsed}ms`, 'accent');
  print('');

  // ── Read results ───────────────────────────────────────────
  // Note: layout_compute runs on node pool copies inside child_bufs,
  // so we read from the root's computed and its children's computed values.
  // For this proof-of-concept, we read all node pool entries.
  const nodes = [];
  const names = ['Root', 'Header', 'Content', 'Sidebar', 'Main', 'Footer'];
  const colors = ['#1a1f29', '#21262d', '#161b22', '#1c2333', '#12171f', '#21262d'];
  for (let i = 0; i <= 5; i++) {
    const x = wasm.node_get_x(i);
    const y = wasm.node_get_y(i);
    const w = wasm.node_get_w(i);
    const h = wasm.node_get_h(i);
    nodes.push({ name: names[i], x, y, w, h, color: colors[i] });
    print(`  ${names[i].padEnd(10)} ${w.toFixed(0).padStart(4)}x${h.toFixed(0).padEnd(4)} @ ${x.toFixed(0)},${y.toFixed(0)}`);
  }

  // ── Verify expected layout ────────────────────────────────
  print('');
  const rootN = nodes[0];
  const headerN = nodes[1];
  const contentN = nodes[2];
  const footerN = nodes[5];

  function check(label, actual, expected, tolerance) {
    const pass = Math.abs(actual - expected) <= (tolerance || 1);
    print(`  ${pass ? 'PASS' : 'FAIL'} ${label}: got ${actual.toFixed(1)}, expected ${expected}`, pass ? 'pass' : 'fail');
    return pass;
  }

  let allPass = true;
  allPass &= check('Root width', rootN.w, 800);
  allPass &= check('Root height', rootN.h, 500);
  allPass &= check('Header height', headerN.h, 48);
  allPass &= check('Footer height', footerN.h, 32);
  allPass &= check('Content height', contentN.h, 420);
  allPass &= check('Header y', headerN.y, 0);
  allPass &= check('Content y', contentN.y, 48);
  allPass &= check('Footer y', footerN.y, 468);

  print('');
  print(allPass ? 'ALL CHECKS PASSED' : 'SOME CHECKS FAILED', allPass ? 'pass' : 'fail');

  // ── Render to canvas ──────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, 800, 500);

  for (const n of nodes) {
    ctx.fillStyle = n.color;
    ctx.fillRect(n.x, n.y, n.w, n.h);
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    ctx.strokeRect(n.x + 0.5, n.y + 0.5, n.w - 1, n.h - 1);
    ctx.fillStyle = '#8b949e';
    ctx.font = '11px monospace';
    ctx.fillText(`${n.name} ${n.w.toFixed(0)}x${n.h.toFixed(0)}`, n.x + 6, n.y + 16);
  }
}

main().catch(e => print('ERROR: ' + e.message, 'fail'));
</script>
</body>
</html>
